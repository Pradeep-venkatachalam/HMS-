<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HMS – Login</title>
<link rel="stylesheet" href="css/style.css"/>
<style>
.auth-wrapper { background: linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%); }
.input-group { position:relative; }
.input-group .toggle-pw { position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9e9e9e;font-size:16px; }
.role-hint { background:#e3f2fd;border-radius:8px;padding:14px 16px;margin-top:20px;font-size:13px; }
.role-hint h4 { color:#1565c0;margin-bottom:8px;font-size:13px; }
.role-hint p { color:#1976d2;margin:2px 0;font-family:monospace; }
</style>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">🏥</div>
      <h1>Hospital Management System</h1>
      <p>Sign in to your account</p>
    </div>
    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" id="username" class="form-control" placeholder="Enter username" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-group">
          <input type="password" id="password" class="form-control" placeholder="Enter password" required/>
          <button type="button" class="toggle-pw" onclick="togglePw()">👁</button>
        </div>
      </div>
      <div id="loginError" class="form-error hidden"></div>
      <button type="submit" id="loginBtn" class="btn btn-primary btn-full btn-lg" style="margin-top:8px">
        Sign In
      </button>
    </form>
    <div class="role-hint">
      <h4>🔐 Default Credentials</h4>
      <p><b>Admin:</b> admin / admin123</p>
      <p><b>Receptionist:</b> receptionist / recept123</p>
    </div>
  </div>
</div>
<script src="js/api.js"></script>
<script>
if (api.isLoggedIn()) window.location.href = 'pages/dashboard.html';

function togglePw() {
  const f = document.getElementById('password');
  f.type = f.type === 'password' ? 'text' : 'password';
}

document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('loginError');
  errEl.classList.add('hidden');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Signing in...';
  try {
    const res = await api.login({
      username: document.getElementById('username').value.trim(),
      password: document.getElementById('password').value
    });
    if (res && res.data) {
      localStorage.setItem('token', res.data.token);
      localStorage.setItem('user', JSON.stringify({
        id: res.data.userId, username: res.data.username,
        fullName: res.data.fullName, role: res.data.role,
        profileId: res.data.profileId
      }));
      window.location.href = 'pages/dashboard.html';
    }
  } catch(err) {
    errEl.textContent = err.message || 'Login failed';
    errEl.classList.remove('hidden');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
});
</script>
</body>
</html>
